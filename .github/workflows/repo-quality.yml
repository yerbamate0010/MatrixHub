name: Repo Quality

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/repo-quality.yml"
      - "boards/**"
      - "factory_settings.ini"
      - "interface/**"
      - "lib/**"
      - "packages/device-sdk/**"
      - "partitions/**"
      - "platformio.ini"
      - "scripts/pio/native_coverage.py"
      - "scripts/tests/native_coverage.sh"
      - "sdkconfig.defaults"
      - "src/**"
      - "test/**"
  pull_request:
    paths:
      - ".github/workflows/repo-quality.yml"
      - "boards/**"
      - "factory_settings.ini"
      - "interface/**"
      - "lib/**"
      - "packages/device-sdk/**"
      - "partitions/**"
      - "platformio.ini"
      - "scripts/pio/native_coverage.py"
      - "scripts/tests/native_coverage.sh"
      - "sdkconfig.defaults"
      - "src/**"
      - "test/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repo-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  interface-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: interface
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: interface/package-lock.json

      - name: Install interface dependencies
        run: npm ci

      - name: Typecheck interface
        run: npm run check

      - name: Run interface tests with coverage
        run: npm run test:coverage

      - name: Upload interface coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: interface-coverage
          path: interface/coverage/
          retention-days: 14

      - name: Build interface
        run: npm run build

      - name: Check build size
        run: node ./scripts/check-build-size.mjs

      - name: Lighthouse CI
        run: npx --yes @lhci/cli@0.15 autorun --config=./lighthouserc.json
        continue-on-error: true

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: interface/.lighthouseci/
          retention-days: 14
          if-no-files-found: ignore

  native-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio

      - name: Run native firmware tests
        run: platformio test -e native

  native-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install LLVM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends clang llvm

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio

      - name: Run native tests with coverage instrumentation
        run: bash scripts/tests/native_coverage.sh

      - name: Upload native coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-coverage
          path: .pio/build/native_coverage/coverage/
          retention-days: 14
          if-no-files-found: ignore
