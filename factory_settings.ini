; The indicated settings support placeholder substitution as follows:
;
;  #{platform} - The microcontroller platform, e.g. "esp32" or "esp32c3"
;  #{unique_id} - A unique identifier derived from the MAC address, e.g. "0b0a859d6816"
;  #{random} - A random number encoded as a hex string, e.g. "55722f94"

[factory_settings]
build_flags =
  ; ===========================================================================
  ; WiFi STA settings
  ; ===========================================================================
  -D FACTORY_WIFI_SSID=\"\"
  -D FACTORY_WIFI_PASSWORD=\"\"
  -D FACTORY_WIFI_HOSTNAME=\"matrixhub\" ; fixed (no placeholders) -> mDNS: matrixhub.local

  ; ===========================================================================
  ; Access Point settings
  ; ===========================================================================
  -D FACTORY_AP_SSID=\"matrixhub.local\" ; 1-64 characters
  -D FACTORY_AP_PASSWORD=\"\" ; empty = open AP (no password)
  -D FACTORY_AP_CHANNEL=6 ; channel 6 - center of 2.4GHz band, less interference
  -D FACTORY_AP_SSID_HIDDEN=false
  -D FACTORY_AP_MAX_CLIENTS=4
  -D FACTORY_AP_LOCAL_IP=\"192.168.4.1\"
  -D FACTORY_AP_GATEWAY_IP=\"192.168.4.1\"
  -D FACTORY_AP_SUBNET_MASK=\"255.255.255.0\"

  ; ===========================================================================
  ; Security settings
  ; ===========================================================================
  ; DEV NOTE: keep the recovery admin defaults during the current dev period.
  ; Do not harden these values in-place without also updating the bootstrap,
  ; provisioning, and recovery workflow used by the team.
  ; TODO(production): replace fixed recovery credentials with a production-safe
  ; bootstrap flow before any release build leaves development.
  ; Factory defaults provision only the recovery admin account.
  ; Additional non-admin users are runtime configuration, not a separate
  ; backend role baked into the factory image.
  -D FACTORY_ADMIN_USERNAME=\"admin\"
  -D FACTORY_ADMIN_PASSWORD=\"admin\"
  -D FACTORY_JWT_SECRET=\"#{random}-#{random}-#{random}-#{random}\" ; supports placeholders

  ; ===========================================================================
  ; NTP settings
  ; ===========================================================================
  -D FACTORY_NTP_ENABLED=true
  -D FACTORY_NTP_TIME_ZONE_LABEL=\"Europe/Warsaw\"
  -D FACTORY_NTP_TIME_ZONE_FORMAT=\"CET-1CEST,M3.5.0,M10.5.0/3\"
  -D FACTORY_NTP_SERVER=\"time.google.com\"

  ; ===========================================================================
  ; BLE settings (Bluetooth Low Energy)
  ; ===========================================================================
  -D FACTORY_BLE_ENABLED=false
  -D FACTORY_BLE_ADVERTISING_ENABLED=false
  -D FACTORY_BLE_SCANNER_ENABLED=false

  ; ===========================================================================
  ; Notification settings (Telegram / Webhook)
  ; ===========================================================================
  ; Mode: 0=Disabled, 1=Telegram, 2=Webhook
  -D FACTORY_NOTIFICATION_MODE=0
  -D FACTORY_TELEGRAM_BOT_TOKEN=\"\"
  -D FACTORY_TELEGRAM_CHAT_ID=\"\"
  -D FACTORY_TELEGRAM_COMMANDS_ENABLED=false
  -D FACTORY_WEBHOOK_URL=\"\"

  ; ===========================================================================
  ; WiFi Sensing settings
  ; ===========================================================================
  -D FACTORY_WIFI_SENSING_ENABLED=false
  -D FACTORY_WIFI_SENSING_SAMPLE_INTERVAL_MS=200
  -D 'FACTORY_WIFI_SENSING_VARIANCE_THRESHOLD=4.0f'

  ; ===========================================================================
  ; SCD41 CO2 Sensor Compensation settings
  ; ===========================================================================
  ; -D FACTORY_SCD41_OFFSET_ENABLED=true  ; default: false
  ; -D FACTORY_SCD41_BASE_OFFSET=5.0f     ; Offset at reference CPU temp
  ; -D FACTORY_SCD41_REF_CPU_TEMP=40.0f   ; Reference CPU temp (neutral point)
  ; -D FACTORY_SCD41_OFFSET_SLOPE=0.3f    ; Offset change per degC of CPU temp
  ; -D FACTORY_SCD41_MIN_OFFSET=0.0f
  ; -D FACTORY_SCD41_MAX_OFFSET=15.0f

  ; ===========================================================================
  ; Power Management settings
  ; ===========================================================================
  -D FACTORY_POWER_SLEEP_ENABLED=false
  -D FACTORY_POWER_INACTIVITY_TIMEOUT_MS=300000 ; 5 minutes
  -D FACTORY_POWER_GRACE_AFTER_BOOT_MS=60000 ; 1 minute

  ; ===========================================================================
  ; Logging settings
  ; ===========================================================================
  ; Log levels: 0=None, 1=Error, 2=Warn, 3=Info, 4=Debug, 5=Verbose
  -D FACTORY_LOG_LEVEL=3 ; Info

  ; ===========================================================================
  ; Hardware settings (board-specific)
  ; ===========================================================================
  -D WAKEUP_PIN_NUMBER=0 ; legacy framework wake fallback, aligned with BOOT/USER button GPIO0
  -D WAKEUP_SIGNAL=0 ; wakeup on LOW (button pressed)
